<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Class Unblocker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg:        #161820;
      --surface:   #1e2030;
      --border:    #2a2d3e;
      --accent:    #007bff;
      --accent-glow: rgba(0, 123, 255, 0.35);
      --accent-dim:  rgba(0, 123, 255, 0.12);
      --text:      #e8eaf6;
      --muted:     #6c7a9c;
      --success:   #00e5a0;
      --danger:    #ff4d6d;
      --font-head: 'Syne', sans-serif;
      --font-body: 'DM Sans', sans-serif;
      --radius:    12px;
      --transition: 0.22s cubic-bezier(0.4, 0, 0.2, 1);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 15px;
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* ── Grid background ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,123,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,123,255,0.04) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Ambient glow ── */
    body::after {
      content: '';
      position: fixed;
      top: -20%;
      left: 50%;
      transform: translateX(-50%);
      width: 800px;
      height: 500px;
      background: radial-gradient(ellipse, rgba(0,123,255,0.10) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Layout ── */
    .wrapper {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px 60px;
    }

    /* ── Header ── */
    .header {
      text-align: center;
      margin-bottom: 44px;
      animation: fadeSlideDown 0.6s ease both;
    }

    .logo-badge {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: var(--accent-dim);
      border: 1px solid rgba(0,123,255,0.25);
      border-radius: 100px;
      padding: 6px 16px 6px 10px;
      font-family: var(--font-head);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 20px;
    }

    .logo-badge .dot {
      width: 8px;
      height: 8px;
      background: var(--success);
      border-radius: 50%;
      box-shadow: 0 0 8px var(--success);
      animation: pulse 2s ease infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.6; transform: scale(0.8); }
    }

    h1 {
      font-family: var(--font-head);
      font-size: clamp(2.4rem, 6vw, 4rem);
      font-weight: 800;
      letter-spacing: -0.02em;
      line-height: 1.1;
      background: linear-gradient(135deg, #ffffff 20%, var(--accent) 80%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 10px;
    }

    .subtitle {
      color: var(--muted);
      font-size: 0.95rem;
      font-weight: 300;
      letter-spacing: 0.01em;
    }

    /* ── Status bar ── */
    #sw-status {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      font-size: 0.78rem;
      font-weight: 500;
      margin-top: 14px;
      padding: 5px 14px;
      border-radius: 100px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      letter-spacing: 0.02em;
      transition: var(--transition);
    }

    #sw-status.ready {
      color: var(--success);
      border-color: rgba(0,229,160,0.3);
      background: rgba(0,229,160,0.07);
    }

    #sw-status.error {
      color: var(--danger);
      border-color: rgba(255,77,109,0.3);
      background: rgba(255,77,109,0.07);
    }

    #sw-status .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: currentColor;
    }

    /* ── Search card ── */
    .search-card {
      width: 100%;
      max-width: 680px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 28px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.35), 0 0 0 1px rgba(255,255,255,0.03) inset;
      animation: fadeSlideUp 0.55s ease both 0.1s;
      margin-bottom: 32px;
    }

    .search-label {
      font-family: var(--font-head);
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 12px;
    }

    .input-row {
      display: flex;
      gap: 10px;
    }

    #url-input {
      flex: 1;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 18px;
      font-family: var(--font-body);
      font-size: 0.95rem;
      color: var(--text);
      outline: none;
      transition: var(--transition);
      min-width: 0;
    }

    #url-input::placeholder {
      color: #3a4060;
    }

    #url-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px var(--accent-glow);
    }

    #go-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      padding: 14px 24px;
      font-family: var(--font-head);
      font-size: 0.88rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      cursor: pointer;
      white-space: nowrap;
      transition: var(--transition);
      box-shadow: 0 4px 20px var(--accent-glow);
    }

    #go-btn:hover {
      background: #1a8fff;
      box-shadow: 0 6px 28px rgba(0,123,255,0.5);
      transform: translateY(-1px);
    }

    #go-btn:active {
      transform: translateY(0);
    }

    #go-btn svg {
      width: 15px;
      height: 15px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* ── Error message ── */
    #error-msg {
      display: none;
      align-items: center;
      gap: 8px;
      margin-top: 12px;
      padding: 10px 14px;
      background: rgba(255,77,109,0.08);
      border: 1px solid rgba(255,77,109,0.25);
      border-radius: 8px;
      font-size: 0.82rem;
      color: var(--danger);
    }

    #error-msg.visible {
      display: flex;
    }

    /* ── Quick Access ── */
    .quick-section {
      width: 100%;
      max-width: 680px;
      animation: fadeSlideUp 0.55s ease both 0.2s;
    }

    .quick-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }

    .quick-header span {
      font-family: var(--font-head);
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .quick-header::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .quick-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 10px;
    }

    .quick-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 14px;
      cursor: pointer;
      text-decoration: none;
      color: var(--text);
      font-family: var(--font-body);
      font-size: 0.85rem;
      font-weight: 500;
      transition: var(--transition);
      position: relative;
      overflow: hidden;
    }

    .quick-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--accent-dim);
      opacity: 0;
      transition: var(--transition);
    }

    .quick-btn:hover::before {
      opacity: 1;
    }

    .quick-btn:hover {
      border-color: rgba(0,123,255,0.4);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.2);
      color: #fff;
    }

    .quick-btn:active {
      transform: translateY(0);
    }

    .quick-btn .icon {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      flex-shrink: 0;
      position: relative;
      z-index: 1;
    }

    .quick-btn .label {
      position: relative;
      z-index: 1;
      line-height: 1.2;
    }

    /* Icon background colors */
    .ic-yt   { background: rgba(255,0,0,0.15); }
    .ic-gg   { background: rgba(66,133,244,0.15); }
    .ic-wiki { background: rgba(255,255,255,0.08); }
    .ic-gh   { background: rgba(255,255,255,0.08); }
    .ic-tw   { background: rgba(29,161,242,0.15); }
    .ic-rd   { background: rgba(255,69,0,0.15); }
    .ic-kh   { background: rgba(0,200,83,0.15); }
    .ic-dc   { background: rgba(88,101,242,0.15); }

    /* ── Footer ── */
    footer {
      position: relative;
      z-index: 1;
      margin-top: 48px;
      text-align: center;
      color: #2e3352;
      font-size: 0.75rem;
      letter-spacing: 0.04em;
    }

    /* ── Animations ── */
    @keyframes fadeSlideDown {
      from { opacity: 0; transform: translateY(-18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      .search-card { padding: 20px; border-radius: 16px; }
      .input-row   { flex-direction: column; }
      #go-btn      { justify-content: center; }
      .quick-grid  { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>
  <div class="wrapper">

    <!-- ── Header ── -->
    <header class="header">
      <div class="logo-badge">
        <span class="dot"></span>
        Web Proxy
      </div>
      <h1>Class Unblocker</h1>
      <p class="subtitle">Acesse qualquer site, de qualquer rede, sem restrições.</p>
      <div id="sw-status">
        <span class="status-dot"></span>
        <span id="sw-status-text">Inicializando Service Worker…</span>
      </div>
    </header>

    <!-- ── Search Card ── -->
    <div class="search-card">
      <p class="search-label">Destino</p>
      <div class="input-row">
        <input
          id="url-input"
          type="text"
          placeholder="https://youtube.com  ou  pesquisar algo…"
          autocomplete="off"
          autocorrect="off"
          autocapitalize="off"
          spellcheck="false"
        />
        <button id="go-btn" onclick="navigate()">
          <svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
          Ir
        </button>
      </div>
      <div id="error-msg">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <span id="error-text"></span>
      </div>
    </div>

    <!-- ── Quick Access ── -->
    <section class="quick-section">
      <div class="quick-header">
        <span>Acesso Rápido</span>
      </div>
      <div class="quick-grid" id="quick-grid">
        <!-- Populated by JS -->
      </div>
    </section>

  </div>

  <footer>Class Unblocker &mdash; Powered by Ultraviolet &mdash; Deploy via Vercel</footer>

  <!-- ── Ultraviolet bundle from CDN ── -->
  <script src="https://cdn.jsdelivr.net/npm/@titaniumnetwork-dev/ultraviolet@latest/dist/uv.bundle.js"></script>
  <script src="/uv/uv.config.js"></script>

  <script>
    /* ─────────────────────────────────────────
       XOR encode — mirrors uv.config.js codec
    ───────────────────────────────────────── */
    function xorEncode(str) {
      // Simple XOR encode matching Ultraviolet's built-in codec
      return encodeURIComponent(
        str.split('').map((c, i) => String.fromCharCode(c.charCodeAt(0) ^ 2)).join('')
      );
    }

    /* ─────────────────────────────────────────
       URL normaliser
    ───────────────────────────────────────── */
    function normalise(raw) {
      raw = raw.trim();
      if (!raw) return null;

      // Looks like a URL?
      const hasProto = /^https?:\/\//i.test(raw);
      const looksLikeHost = /^[\w-]+\.[\w.]{2,}(\/|$)/.test(raw);

      if (hasProto) return raw;
      if (looksLikeHost) return 'https://' + raw;

      // Otherwise treat as Google search query
      return 'https://www.google.com/search?q=' + encodeURIComponent(raw);
    }

    /* ─────────────────────────────────────────
       Navigate via UV proxy
    ───────────────────────────────────────── */
    function navigate(rawUrl) {
      const input = rawUrl || document.getElementById('url-input').value;
      const url   = normalise(input);

      if (!url) {
        showError('Digite uma URL ou termo de busca.');
        return;
      }

      clearError();

      // Use the UV config prefix + encoded URL
      const encoded = __uv$config.encodeUrl
        ? __uv$config.encodeUrl(url)
        : xorEncode(url);

      window.location.href = '/service/' + encoded;
    }

    /* ─────────────────────────────────────────
       Error helpers
    ───────────────────────────────────────── */
    function showError(msg) {
      const el = document.getElementById('error-msg');
      document.getElementById('error-text').textContent = msg;
      el.classList.add('visible');
    }

    function clearError() {
      document.getElementById('error-msg').classList.remove('visible');
    }

    /* ─────────────────────────────────────────
       Enter key handler
    ───────────────────────────────────────── */
    document.getElementById('url-input').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') navigate();
    });

    /* ─────────────────────────────────────────
       Service Worker registration
    ───────────────────────────────────────── */
    const statusEl     = document.getElementById('sw-status');
    const statusTextEl = document.getElementById('sw-status-text');

    async function registerSW() {
      if (!('serviceWorker' in navigator)) {
        statusEl.classList.add('error');
        statusTextEl.textContent = 'Service Worker não suportado neste navegador.';
        return;
      }

      try {
        const reg = await navigator.serviceWorker.register('/uv/uv.sw.js', {
          scope: '/service/',
        });

        await navigator.serviceWorker.ready;

        statusEl.classList.add('ready');
        statusTextEl.textContent = 'Service Worker ativo — pronto para navegar';

        // Keep SW alive
        reg.update();
      } catch (err) {
        statusEl.classList.add('error');
        statusTextEl.textContent = 'Erro ao registrar Service Worker: ' + err.message;
        console.error('[UV SW]', err);
      }
    }

    registerSW();

    /* ─────────────────────────────────────────
       Quick Access buttons
    ───────────────────────────────────────── */
    const shortcuts = [
      { label: 'YouTube',     url: 'https://youtube.com',           icon: '▶',   cls: 'ic-yt'   },
      { label: 'Google',      url: 'https://google.com',            icon: '🔍',  cls: 'ic-gg'   },
      { label: 'Wikipedia',   url: 'https://en.wikipedia.org',      icon: '📖',  cls: 'ic-wiki' },
      { label: 'GitHub',      url: 'https://github.com',            icon: '</>', cls: 'ic-gh'   },
      { label: 'Twitter / X', url: 'https://x.com',                 icon: '✦',   cls: 'ic-tw'   },
      { label: 'Reddit',      url: 'https://reddit.com',            icon: '⬆',   cls: 'ic-rd'   },
      { label: 'Khan Academy',url: 'https://khanacademy.org',       icon: '🎓',  cls: 'ic-kh'   },
      { label: 'Discord',     url: 'https://discord.com/app',       icon: '#',   cls: 'ic-dc'   },
    ];

    const grid = document.getElementById('quick-grid');
    shortcuts.forEach(({ label, url, icon, cls }) => {
      const btn = document.createElement('button');
      btn.className = 'quick-btn';
      btn.title     = url;
      btn.innerHTML = `
        <span class="icon ${cls}">${icon}</span>
        <span class="label">${label}</span>
      `;
      btn.addEventListener('click', () => navigate(url));
      grid.appendChild(btn);
    });
  </script>
</body>
</html>

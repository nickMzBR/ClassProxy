<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Class Unblocker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d0f1a; --card: #1c1f2e; --border: #252839;
      --accent: #007bff; --accent-h: #3395ff; --accent-glow: rgba(0,123,255,0.4);
      --accent-dim: rgba(0,123,255,0.10); --text: #e8eaf6; --muted: #5a6482;
      --success: #00e5a0; --danger: #ff4d6d; --radius: 14px;
    }
    html, body { height: 100%; background: var(--bg); color: var(--text);
      font-family: 'DM Sans', sans-serif; overflow-x: hidden; }
    body::before {
      content: ''; position: fixed; inset: 0; z-index: 0;
      background-image: linear-gradient(rgba(0,123,255,0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,123,255,0.035) 1px, transparent 1px);
      background-size: 52px 52px; pointer-events: none;
    }
    body::after {
      content: ''; position: fixed; top: -15%; left: 50%; transform: translateX(-50%);
      width: 900px; height: 600px; z-index: 0;
      background: radial-gradient(ellipse, rgba(0,123,255,0.12) 0%, transparent 65%);
      pointer-events: none;
    }
    .page { position: relative; z-index: 1; min-height: 100vh;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 40px 16px 72px; }
    .header { text-align: center; margin-bottom: 40px; animation: up .55s ease both; }
    .badge { display: inline-flex; align-items: center; gap: 8px;
      background: var(--accent-dim); border: 1px solid rgba(0,123,255,0.22);
      border-radius: 100px; padding: 5px 16px 5px 10px;
      font-family: 'Syne', sans-serif; font-size: 10px; font-weight: 700;
      letter-spacing: 0.14em; text-transform: uppercase; color: var(--accent); margin-bottom: 22px; }
    .badge .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--success);
      box-shadow: 0 0 8px var(--success); animation: blink 2.2s ease infinite; }
    h1 { font-family: 'Syne', sans-serif; font-size: clamp(2.6rem, 7vw, 4.2rem);
      font-weight: 800; letter-spacing: -0.03em; line-height: 1.05; margin-bottom: 12px; }
    h1 .w { color: #fff; } h1 .b { color: var(--accent); }
    .sub { color: var(--muted); font-size: .93rem; font-weight: 300; max-width: 400px; margin: 0 auto; }
    .card { width: 100%; max-width: 640px; background: var(--card); border: 1px solid var(--border);
      border-radius: 22px; padding: 28px;
      box-shadow: 0 30px 90px rgba(0,0,0,.4), inset 0 1px 0 rgba(255,255,255,.04);
      animation: up .55s ease both .1s; margin-bottom: 24px; }
    .input-wrap { position: relative; display: flex; align-items: center; margin-bottom: 12px; }
    .input-wrap svg { position: absolute; left: 16px; width: 17px; height: 17px;
      stroke: var(--muted); fill: none; stroke-width: 2; stroke-linecap: round; pointer-events: none; }
    #url-input { width: 100%; background: #0d0f1a; border: 1.5px solid var(--border);
      border-radius: var(--radius); padding: 15px 18px 15px 46px;
      font-family: 'DM Sans', sans-serif; font-size: .95rem; color: var(--text); outline: none;
      transition: border-color .22s, box-shadow .22s; }
    #url-input::placeholder { color: #2e3350; }
    #url-input:focus { border-color: var(--accent); box-shadow: 0 0 0 4px var(--accent-glow); }
    #go-btn { width: 100%; display: flex; align-items: center; justify-content: center; gap: 9px;
      background: var(--accent); color: #fff; border: none; border-radius: var(--radius); padding: 15px;
      font-family: 'Syne', sans-serif; font-size: .9rem; font-weight: 700; letter-spacing: .05em;
      cursor: pointer; box-shadow: 0 4px 22px var(--accent-glow);
      transition: background .22s, transform .15s; }
    #go-btn:hover { background: var(--accent-h); transform: translateY(-1px); }
    #go-btn:active { transform: translateY(0); }
    #go-btn svg { width: 16px; height: 16px; fill: none; stroke: #fff; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
    .quick { width: 100%; max-width: 640px; animation: up .55s ease both .2s; }
    .ql { display: flex; align-items: center; gap: 10px; margin-bottom: 14px;
      font-family: 'Syne', sans-serif; font-size: .7rem; font-weight: 700;
      letter-spacing: .14em; text-transform: uppercase; color: var(--muted); }
    .ql::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .qgrid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 9px; }
    .qbtn { display: flex; align-items: center; gap: 10px; background: var(--card);
      border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 14px;
      cursor: pointer; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: .84rem;
      font-weight: 500; transition: border-color .2s, transform .2s; position: relative; overflow: hidden; }
    .qbtn::after { content: ''; position: absolute; inset: 0; background: var(--accent-dim); opacity: 0; transition: opacity .2s; }
    .qbtn:hover { border-color: rgba(0,123,255,.45); transform: translateY(-2px); }
    .qbtn:hover::after { opacity: 1; }
    .qi { width: 30px; height: 30px; border-radius: 7px; display: flex; align-items: center;
      justify-content: center; font-size: 15px; flex-shrink: 0; position: relative; z-index: 1; }
    .ql-txt { position: relative; z-index: 1; }
    .ic-yt{background:rgba(255,0,0,.15)} .ic-gg{background:rgba(66,133,244,.15)}
    .ic-wi{background:rgba(255,255,255,.07)} .ic-gh{background:rgba(255,255,255,.07)}
    .ic-rd{background:rgba(255,69,0,.15)} .ic-kh{background:rgba(0,200,83,.15)}
    .ic-tw{background:rgba(29,161,242,.15)} .ic-dc{background:rgba(88,101,242,.15)}
    footer { position: relative; z-index: 1; margin-top: 52px; text-align: center;
      color: #22263a; font-size: .73rem; }
    @keyframes up { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
    @keyframes blink { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(.75)} }
    @media(max-width:480px){ .card{padding:20px 18px} .qgrid{grid-template-columns:repeat(2,1fr)} }
  </style>
</head>
<body>
<div class="page">
  <header class="header">
    <div class="badge"><span class="dot"></span>Class Proxy your free browser</div>
    <h1><span class="w">Class </span><span class="b">Unblocker</span></h1>
    <p class="sub">Browse freely. Enter a URL or search term to get started.</p>
  </header>

  <div class="card">
    <div class="input-wrap">
      <input id="url-input" type="text" placeholder="Search or enter a URL…"
        autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" />
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    </div>
    <button id="go-btn" onclick="go()">
      <svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
      Go
    </button>
  </div>

  <section class="quick">
    <div class="ql">Quick Access</div>
    <div class="qgrid" id="qgrid"></div>
  </section>
</div>
<footer>By red</footer>

<script>
function go(raw) {
  var v = raw || document.getElementById("url-input").value.trim();
  if (!v) return;
  if (!/^https?:\/\//i.test(v)) {
    // Se parece domínio, adiciona https; senão, busca no Google
    v = /^[\w-]+\.[\w.]{2,}/.test(v)
      ? "https://" + v
      : "https://www.google.com/search?q=" + encodeURIComponent(v);
  }
  window.location.href = "/api/proxy?url=" + encodeURIComponent(v);
}

document.getElementById("url-input").addEventListener("keydown", function(e){
  if (e.key === "Enter") go();
});

var shortcuts = [
  {label:"Google",      url:"https://www.google.com",      icon:"🔍", cls:"ic-gg"},
  {label:"YouTube",     url:"https://www.youtube.com",     icon:"▶",  cls:"ic-yt"},
  {label:"Wikipedia",   url:"https://en.wikipedia.org",    icon:"📖", cls:"ic-wi"},
  {label:"Reddit",      url:"https://www.reddit.com",      icon:"⬆",  cls:"ic-rd"},
  {label:"GitHub",      url:"https://github.com",          icon:"</>",cls:"ic-gh"},
  {label:"Khan Academy",url:"https://www.khanacademy.org", icon:"🎓", cls:"ic-kh"},
  {label:"Twitter / X", url:"https://x.com",               icon:"✦",  cls:"ic-tw"},
  {label:"Discord",     url:"https://discord.com/app",     icon:"#",  cls:"ic-dc"},
];

var grid = document.getElementById("qgrid");
shortcuts.forEach(function(s){
  var b = document.createElement("button");
  b.className = "qbtn";
  b.innerHTML = '<span class="qi ' + s.cls + '">' + s.icon + '</span><span class="ql-txt">' + s.label + '</span>';
  b.onclick = function(){ go(s.url); };
  grid.appendChild(b);
});
</script>
</body>
</html>

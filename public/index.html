<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Class Unblocker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg:        #1a1a1e;
      --surface:   #222228;
      --border:    #2e2e38;
      --accent:    #007bff;
      --accent-glow: rgba(0, 123, 255, 0.35);
      --accent-dim:  rgba(0, 123, 255, 0.08);
      --text:      #e0e4ef;
      --muted:     #6b7280;
      --mono:      'Share Tech Mono', monospace;
      --sans:      'Barlow', sans-serif;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      overflow-x: hidden;
    }

    /* ─── Grid background ─── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,123,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,123,255,0.04) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
      z-index: 0;
    }

    /* ─── Radial glow ─── */
    body::after {
      content: '';
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -60%);
      width: 700px;
      height: 700px;
      background: radial-gradient(circle, rgba(0,123,255,0.10) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* ─── Layout ─── */
    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      gap: 3.5rem;
    }

    /* ─── Header ─── */
    .header {
      text-align: center;
      animation: fadeDown 0.7s ease both;
    }

    .logo-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      margin-bottom: 0.6rem;
    }

    .logo-icon {
      width: 38px;
      height: 38px;
      position: relative;
    }

    .logo-icon svg {
      width: 100%;
      height: 100%;
      filter: drop-shadow(0 0 8px var(--accent));
    }

    h1 {
      font-family: var(--sans);
      font-weight: 700;
      font-size: clamp(2rem, 5vw, 3.2rem);
      letter-spacing: -0.02em;
      color: #fff;
    }

    h1 span {
      color: var(--accent);
      text-shadow: 0 0 24px var(--accent-glow);
    }

    .tagline {
      font-family: var(--mono);
      font-size: 0.8rem;
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .tagline .blink {
      display: inline-block;
      width: 8px;
      height: 8px;
      background: var(--accent);
      border-radius: 50%;
      margin-right: 0.5rem;
      box-shadow: 0 0 8px var(--accent);
      animation: pulse 2s ease-in-out infinite;
    }

    /* ─── Search bar ─── */
    .search-card {
      width: 100%;
      max-width: 680px;
      animation: fadeUp 0.7s 0.15s ease both;
    }

    .search-label {
      font-family: var(--mono);
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 0.6rem;
      padding-left: 4px;
    }

    .search-wrap {
      display: flex;
      align-items: center;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 6px 6px 6px 20px;
      transition: border-color 0.25s, box-shadow 0.25s;
    }

    .search-wrap:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-dim), 0 0 32px var(--accent-glow);
    }

    .lock-icon {
      color: var(--muted);
      margin-right: 12px;
      flex-shrink: 0;
      transition: color 0.25s;
    }

    .search-wrap:focus-within .lock-icon {
      color: var(--accent);
    }

    #url-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      font-family: var(--mono);
      font-size: 0.97rem;
      color: var(--text);
      caret-color: var(--accent);
      letter-spacing: 0.02em;
    }

    #url-input::placeholder {
      color: #40424d;
    }

    #url-input:-webkit-autofill {
      -webkit-text-fill-color: var(--text);
      -webkit-box-shadow: 0 0 0px 1000px var(--surface) inset;
    }

    .go-btn {
      flex-shrink: 0;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 0 1.5rem;
      height: 46px;
      font-family: var(--sans);
      font-weight: 600;
      font-size: 0.9rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: background 0.2s, box-shadow 0.2s, transform 0.1s;
    }

    .go-btn:hover {
      background: #1a8fff;
      box-shadow: 0 0 20px var(--accent-glow);
    }

    .go-btn:active {
      transform: scale(0.97);
    }

    .go-btn svg {
      transition: transform 0.2s;
    }

    .go-btn:hover svg {
      transform: translateX(3px);
    }

    /* ─── Quick links ─── */
    .quick-links {
      width: 100%;
      max-width: 680px;
      animation: fadeUp 0.7s 0.25s ease both;
    }

    .ql-label {
      font-family: var(--mono);
      font-size: 0.68rem;
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 0.75rem;
      padding-left: 2px;
    }

    .ql-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .ql-chip {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: var(--mono);
      font-size: 0.75rem;
      padding: 6px 14px;
      border-radius: 999px;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.04em;
    }

    .ql-chip:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-dim);
      box-shadow: 0 0 10px var(--accent-glow);
    }

    /* ─── Stats bar ─── */
    .stats-bar {
      display: flex;
      gap: 2.5rem;
      animation: fadeUp 0.7s 0.35s ease both;
    }

    .stat {
      text-align: center;
    }

    .stat-value {
      font-family: var(--mono);
      font-size: 1.4rem;
      color: var(--accent);
      text-shadow: 0 0 12px var(--accent-glow);
      display: block;
    }

    .stat-label {
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    /* ─── Status line ─── */
    .status-line {
      font-family: var(--mono);
      font-size: 0.72rem;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 0.5rem;
      animation: fadeUp 0.7s 0.4s ease both;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      background: #22c55e;
      border-radius: 50%;
      box-shadow: 0 0 6px #22c55e;
      animation: pulse 2s ease-in-out infinite;
    }

    /* ─── Loading overlay ─── */
    #loader {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 100;
      background: var(--bg);
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
    }

    #loader.active {
      display: flex;
    }

    .loader-ring {
      width: 56px;
      height: 56px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      box-shadow: 0 0 20px var(--accent-glow);
    }

    .loader-text {
      font-family: var(--mono);
      font-size: 0.8rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .loader-url {
      font-family: var(--mono);
      font-size: 0.72rem;
      color: var(--accent);
      max-width: 400px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ─── Footer ─── */
    footer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 12px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-top: 1px solid var(--border);
      background: rgba(26, 26, 30, 0.85);
      backdrop-filter: blur(10px);
      z-index: 10;
    }

    footer span {
      font-family: var(--mono);
      font-size: 0.68rem;
      color: var(--muted);
      letter-spacing: 0.06em;
    }

    footer span b {
      color: var(--accent);
    }

    /* ─── Keyframes ─── */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.35; }
    }

    /* ─── Responsive ─── */
    @media (max-width: 480px) {
      .stats-bar { gap: 1.5rem; }
      .go-btn { padding: 0 1rem; }
    }
  </style>
</head>
<body>

<!-- Loading overlay -->
<div id="loader">
  <div class="loader-ring"></div>
  <span class="loader-text">Establishing Tunnel</span>
  <span class="loader-url" id="loader-url"></span>
</div>

<main class="page">

  <!-- Header -->
  <header class="header">
    <div class="logo-row">
      <div class="logo-icon">
        <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="20" cy="20" r="18" stroke="#007bff" stroke-width="1.5" stroke-dasharray="4 3"/>
          <path d="M12 20 C12 12 28 12 28 20 C28 28 12 28 12 20Z" stroke="#007bff" stroke-width="1.5" fill="none"/>
          <path d="M20 2 Q20 20 20 38" stroke="#007bff" stroke-width="1" opacity="0.5"/>
          <path d="M2 20 Q20 20 38 20" stroke="#007bff" stroke-width="1" opacity="0.5"/>
          <circle cx="20" cy="20" r="3" fill="#007bff"/>
        </svg>
      </div>
      <h1>Class<span>Unblocker</span></h1>
    </div>
    <p class="tagline">
      <span class="blink"></span>
      Reverse Proxy · SSL Bypass · Zero Trace
    </p>
  </header>

  <!-- Search -->
  <div class="search-card">
    <p class="search-label">// Enter Target URL</p>
    <div class="search-wrap">
      <svg class="lock-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
      <input
        id="url-input"
        type="text"
        placeholder="https://example.com"
        autocomplete="off"
        autocorrect="off"
        autocapitalize="off"
        spellcheck="false"
      />
      <button class="go-btn" onclick="navigate()">
        Connect
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="5" y1="12" x2="19" y2="12"/>
          <polyline points="12 5 19 12 12 19"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Quick links -->
  <div class="quick-links">
    <p class="ql-label">// Quick Access</p>
    <div class="ql-grid">
      <button class="ql-chip" onclick="setUrl('https://www.google.com')">google.com</button>
      <button class="ql-chip" onclick="setUrl('https://www.wikipedia.org')">wikipedia.org</button>
      <button class="ql-chip" onclick="setUrl('https://www.reddit.com')">reddit.com</button>
      <button class="ql-chip" onclick="setUrl('https://www.youtube.com')">youtube.com</button>
      <button class="ql-chip" onclick="setUrl('https://discord.com')">discord.com</button>
      <button class="ql-chip" onclick="setUrl('https://www.twitch.tv')">twitch.tv</button>
      <button class="ql-chip" onclick="setUrl('https://github.com')">github.com</button>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats-bar">
    <div class="stat">
      <span class="stat-value">SSL</span>
      <span class="stat-label">Encrypted</span>
    </div>
    <div class="stat">
      <span class="stat-value">0ms*</span>
      <span class="stat-label">Extra Hops</span>
    </div>
    <div class="stat">
      <span class="stat-value">∞</span>
      <span class="stat-label">Sites Supported</span>
    </div>
  </div>

  <!-- Status -->
  <div class="status-line">
    <span class="status-dot"></span>
    <span>Proxy server online · Vercel Edge Network · Node.js runtime</span>
  </div>

</main>

<footer>
  <span>CLASS<b>UNBLOCKER</b> · v1.0</span>
  <span>Powered by <b>Vercel</b> Serverless API</span>
</footer>

<script>
  const input = document.getElementById('url-input');
  const loader = document.getElementById('loader');
  const loaderUrl = document.getElementById('loader-url');

  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') navigate();
  });

  function setUrl(url) {
    input.value = url;
    input.focus();
  }

  function navigate() {
    let url = input.value.trim();
    if (!url) {
      input.focus();
      shake(input.closest('.search-wrap'));
      return;
    }

    if (!/^https?:\/\//i.test(url)) {
      url = 'https://' + url;
    }

    // Show loader
    loaderUrl.textContent = url;
    loader.classList.add('active');

    // Redirect to proxy
    window.location.href = '/api/proxy?url=' + encodeURIComponent(url);
  }

  function shake(el) {
    el.style.animation = 'none';
    el.style.borderColor = '#ef4444';
    el.style.boxShadow = '0 0 0 3px rgba(239,68,68,0.2)';
    setTimeout(() => {
      el.style.borderColor = '';
      el.style.boxShadow = '';
    }, 600);
  }
</script>
</body>
</html>

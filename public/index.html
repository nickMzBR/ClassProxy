<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Class Unblocker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg:        #1a1a1f;
      --surface:   #222228;
      --surface-2: #2a2a32;
      --border:    rgba(255,255,255,0.07);
      --accent:    #007bff;
      --accent-glow: rgba(0, 123, 255, 0.35);
      --accent-hover: #339cff;
      --text:      #f0f0f5;
      --text-muted:#8888aa;
      --radius:    14px;
      --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Background grid ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,123,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,123,255,0.04) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Ambient glow ── */
    body::after {
      content: '';
      position: fixed;
      top: -20%;
      left: 50%;
      transform: translateX(-50%);
      width: 700px;
      height: 500px;
      background: radial-gradient(ellipse, rgba(0,123,255,0.12) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Main wrapper ── */
    .wrapper {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 680px;
      padding: 2rem 1.5rem;
      animation: fadeUp 0.7s cubic-bezier(0.4, 0, 0.2, 1) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Logo / badge ── */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 0.35rem 1rem;
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 2rem;
    }

    .badge-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.5; transform: scale(0.7); }
    }

    /* ── Heading ── */
    h1 {
      font-size: clamp(2.2rem, 6vw, 3.4rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.1;
      text-align: center;
      margin-bottom: 0.75rem;
    }

    h1 span {
      background: linear-gradient(135deg, #fff 30%, var(--accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      font-size: 0.95rem;
      color: var(--text-muted);
      font-weight: 300;
      text-align: center;
      margin-bottom: 2.8rem;
      letter-spacing: 0.01em;
    }

    /* ── Search card ── */
    .search-card {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: calc(var(--radius) + 4px);
      padding: 1.5rem;
      box-shadow:
        0 4px 6px rgba(0,0,0,0.3),
        0 1px 0 rgba(255,255,255,0.04) inset;
    }

    /* ── Search bar ── */
    .search-row {
      display: flex;
      gap: 0.6rem;
      width: 100%;
    }

    .search-input-wrap {
      flex: 1;
      position: relative;
    }

    .search-icon {
      position: absolute;
      left: 1.1rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      pointer-events: none;
      display: flex;
      align-items: center;
    }

    .search-input {
      width: 100%;
      height: 52px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0 1.1rem 0 3rem;
      font-family: 'Poppins', sans-serif;
      font-size: 0.95rem;
      font-weight: 400;
      color: var(--text);
      outline: none;
      transition: border-color var(--transition), box-shadow var(--transition);
    }

    .search-input::placeholder {
      color: var(--text-muted);
    }

    .search-input:focus {
      border-color: rgba(0,123,255,0.5);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .search-btn {
      height: 52px;
      padding: 0 1.6rem;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-family: 'Poppins', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 0.45rem;
      transition: background var(--transition), transform var(--transition), box-shadow var(--transition);
      box-shadow: 0 0 20px rgba(0,123,255,0.3);
    }

    .search-btn:hover {
      background: var(--accent-hover);
      transform: translateY(-1px);
      box-shadow: 0 0 30px rgba(0,123,255,0.5);
    }

    .search-btn:active {
      transform: translateY(0);
    }

    /* ── Quick-access chips ── */
    .quick-label {
      font-size: 0.73rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-top: 1.2rem;
      margin-bottom: 0.6rem;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 0.45rem;
    }

    .chip {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 0.3rem 0.9rem;
      font-size: 0.8rem;
      font-weight: 400;
      color: var(--text-muted);
      cursor: pointer;
      transition: color var(--transition), border-color var(--transition), background var(--transition);
      user-select: none;
    }

    .chip:hover {
      color: var(--accent);
      border-color: rgba(0,123,255,0.4);
      background: rgba(0,123,255,0.08);
    }

    /* ── Footer ── */
    footer {
      position: relative;
      z-index: 1;
      margin-top: 3rem;
      font-size: 0.75rem;
      color: var(--text-muted);
      letter-spacing: 0.04em;
    }

    footer a {
      color: inherit;
      text-decoration: none;
      opacity: 0.6;
    }

    footer a:hover {
      opacity: 1;
    }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      .search-row { flex-direction: column; }
      .search-btn  { height: 48px; justify-content: center; }
      .search-input { height: 48px; }
    }
  </style>
</head>
<body>

  <div class="wrapper">

    <div class="badge">
      <span class="badge-dot"></span>
      Proxy · Secure · Fast
    </div>

    <h1><span>Class Unblocker</span></h1>
    <p class="subtitle">Browse freely. Enter a URL or search term to get started.</p>

    <div class="search-card">
      <div class="search-row">
        <div class="search-input-wrap">
          <span class="search-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
          </span>
          <input
            id="searchInput"
            class="search-input"
            type="text"
            placeholder="Search or enter a URL…"
            autocomplete="off"
            autocorrect="off"
            spellcheck="false"
          />
        </div>
        <button class="search-btn" id="goBtn" onclick="handleSearch()">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>
          </svg>
          Go
        </button>
      </div>

      <p class="quick-label">Quick access</p>
      <div class="chips" id="chips"></div>
    </div>

  </div>

  <footer>&copy; 2025 Class Unblocker &nbsp;·&nbsp; <a href="#">Privacy</a></footer>

  <script src="/uv/uv.bundle.js"></script>
  <script src="/uv/uv.config.js"></script>

  <script>
    // ── Quick-access chips ──────────────────────────────────────────────────
    const shortcuts = [
      { label: 'Google',    url: 'https://google.com'    },
      { label: 'YouTube',   url: 'https://youtube.com'   },
      { label: 'Wikipedia', url: 'https://wikipedia.org' },
      { label: 'Chatgpt',    url: 'https://chatgpt.com'    },
      { label: 'Eclipse Lunar',    url: 'https://crimsonzerohub.xyz/'    },
      { label: 'Khan Academy', url: 'https://khanacademy.org' },
    ];

    const chipsEl = document.getElementById('chips');
    shortcuts.forEach(({ label, url }) => {
      const chip = document.createElement('button');
      chip.className = 'chip';
      chip.textContent = label;
      chip.addEventListener('click', () => navigate(url));
      chipsEl.appendChild(chip);
    });

    // ── Enter key ──────────────────────────────────────────────────────────
    document.getElementById('searchInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') handleSearch();
    });

    // ── Search / navigate logic ────────────────────────────────────────────
    function handleSearch() {
      const raw = document.getElementById('searchInput').value.trim();
      if (!raw) return;
      navigate(raw);
    }

    function navigate(raw) {
      let target;
      try {
        // if it parses as a URL (with or without scheme) → proxy it
        const withScheme = /^https?:\/\//i.test(raw) ? raw : 'https://' + raw;
        const url = new URL(withScheme);
        // basic host check: must have a dot (e.g. google.com)
        if (url.hostname.includes('.')) {
          target = url.href;
        } else {
          throw new Error('search term');
        }
      } catch {
        // fall back to Google search
        target = 'https://www.google.com/search?q=' + encodeURIComponent(raw);
      }

      // Route through Ultraviolet if available, otherwise open directly
      if (typeof __uv$config !== 'undefined' && __uv$config.prefix) {
        location.href = __uv$config.prefix + __uv$config.encodeUrl(target);
      } else {
        window.open(target, '_blank', 'noopener,noreferrer');
      }
    }
  </script>

</body>
</html>

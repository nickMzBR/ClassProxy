<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navegador Privado</title>
    <style>
        /* Estilo Azul Minimalista */
        body { font-family: sans-serif; background: #0f172a; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        .bar { background: #1e293b; padding: 10px; display: flex; gap: 5px; border-bottom: 2px solid #007bff; }
        input { flex: 1; padding: 12px; border-radius: 8px; border: none; font-size: 16px; }
        button { background: #007bff; color: white; border: none; padding: 10px 15px; border-radius: 8px; font-weight: bold; }
        iframe { flex: 1; border: none; background: white; }
    </style>
</head>
<body>

    <div class="bar">
        <input type="text" id="urlInput" placeholder="https://site-bloqueado.com">
        <button id="goBtn">IR</button>
    </div>

    <iframe id="viewer"></iframe>

    <script>
        // JS DO NAVEGADOR
        const input = document.getElementById('urlInput');
        const btn = document.getElementById('goBtn');
        const frame = document.getElementById('viewer');

        btn.onclick = () => {
            let url = input.value;
            if (!url.startsWith('http')) url = 'https://' + url;
            
            // Manda para a nossa função no Vercel
            frame.src = `/api/proxy?url=${encodeURIComponent(url)}`;
        };
    </script>
</body>
</html>

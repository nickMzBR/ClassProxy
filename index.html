<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navegador Stealth Pro</title>
    <style>
        :root {
            --bg: #0f172a;
            --accent: #007bff;
            --bar: #1e293b;
        }

        body, html {
            margin: 0; padding: 0;
            height: 100%; width: 100%;
            background: var(--bg);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .navbar {
            background: var(--bar);
            padding: 10px;
            display: flex;
            gap: 8px;
            border-bottom: 2px solid var(--accent);
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        input {
            flex: 1;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #334155;
            background: #0f172a;
            color: white;
            font-size: 14px;
            outline: none;
        }

        input:focus { border-color: var(--accent); }

        button {
            background: var(--accent);
            color: white;
            border: none;
            padding: 0 20px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        button:active { transform: scale(0.95); }

        .frame-container {
            flex: 1;
            width: 100%;
            background: white;
            position: relative;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <div class="navbar">
        <input type="text" id="url" placeholder="Digite o site (ex: google.com.br)">
        <button onclick="carregar()">IR</button>
    </div>

    <div class="frame-container">
        <iframe id="browser" src="about:blank"></iframe>
    </div>

    <script>
        function carregar() {
            let target = document.getElementById('url').value.trim();
            if (!target) return;

            // Limpa a URL
            target = target.replace(/^https?:\/\//, '');
            const finalUrl = "https://" + target;

            // Mostra o status no console do navegador (útil no celular)
            console.log("Navegando para: " + finalUrl);

            // Chama a API do Vercel
            const proxyPath = `/api/proxy?url=${encodeURIComponent(finalUrl)}`;
            document.getElementById('browser').src = proxyPath;
        }

        // Permite apertar "Enter" no teclado do celular para ir
        document.getElementById('url').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') carregar();
        });
    </script>
</body>
</html>
